name: Deploy BE

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub 로그인
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: 이미지 빌드 및 푸시
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wku-iksan-store-be:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/wku-iksan-store-be:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: BE 서버에 SSH 접속해 재배포 (Nginx 경유)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.BE_HOST }}
          username: ${{ secrets.BE_USER }}
          key: ${{ secrets.CICD_SSH_KEY }}
          proxy_host: ${{ secrets.NGINX_HOST }}
          proxy_username: ${{ secrets.NGINX_USER }}
          proxy_key: ${{ secrets.CICD_SSH_KEY }}
          script: |
            cd ~/wku-iksan-store-BE
            ./deploy.sh
