# 목적: iksan.store 도메인의 Nginx 리버스 프록시·SSL 설정
# 왜: EC2에만 있던 설정을 git으로 버전관리하고, Nginx 컨테이너에 그대로 마운트해서 쓰기 위함
# 무엇: 80은 443으로 리다이렉트, 443은 인증서 적용 후 app 컨테이너(3000)로 프록시

server {
    listen 80;
    server_name iksan.store www.iksan.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name iksan.store www.iksan.store;

    ssl_certificate /etc/letsencrypt/live/iksan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iksan.store/privkey.pem;

    location / {
        proxy_pass http://app:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
