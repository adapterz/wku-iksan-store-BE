# 목적: iksan.store 도메인의 Nginx 리버스 프록시·SSL 설정
# 왜: iwinv 4서버(Nginx/FE/BE/DB) 분리 구조에 맞춰, FE/BE 각 서버의 사설 IP로 경로 기반 라우팅
# 무엇: 80은 443으로 리다이렉트, 443은 인증서 적용 후 /api는 BE, 나머지는 FE로 프록시

server {
    listen 80;
    server_name iksan.store www.iksan.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name iksan.store www.iksan.store;

    ssl_certificate /etc/letsencrypt/live/iksan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iksan.store/privkey.pem;

    # BE 사설 서버(10.101.2.179:4000)로 API 요청 프록시
    # proxy_pass에 경로를 안 붙여야 /api/products 등 원래 경로가 그대로 BE로 전달됨
    location /api/ {
        proxy_pass http://10.101.2.179:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FE 사설 서버(10.101.2.77:3000)로 나머지 요청 프록시
    location / {
        proxy_pass http://10.101.2.77:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
